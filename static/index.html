<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signature Verification</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                    <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                    <path d="M2 2l7.586 7.586"/>
                    <circle cx="11" cy="11" r="2"/>
                </svg>
                <div>
                    <h1>Signature Verification Agent</h1>
                    <p class="subtitle">AI-powered visual signature similarity analysis</p>
                </div>
            </div>
        </header>

        <!-- Mode Tabs -->
        <nav class="tabs">
            <button class="tab active" data-mode="single">Single Compare</button>
            <button class="tab" data-mode="batch">Batch Verify</button>
            <button class="tab" data-mode="audit">Audit Log</button>
        </nav>

        <!-- Single Compare Mode -->
        <section id="mode-single" class="mode active">
            <div class="upload-row">
                <div class="upload-zone" id="zone-img1">
                    <input type="file" id="input-img1" accept="image/png,image/jpeg,image/webp,image/gif" hidden />
                    <div class="upload-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                        <span>Signature 1</span>
                        <small>Click or drag &amp; drop</small>
                    </div>
                    <img class="preview" id="preview-img1" alt="Signature 1" />
                    <button class="remove-btn" id="remove-img1" title="Remove">&times;</button>
                </div>
                <div class="upload-zone" id="zone-img2">
                    <input type="file" id="input-img2" accept="image/png,image/jpeg,image/webp,image/gif" hidden />
                    <div class="upload-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                        <span>Signature 2</span>
                        <small>Click or drag &amp; drop</small>
                    </div>
                    <img class="preview" id="preview-img2" alt="Signature 2" />
                    <button class="remove-btn" id="remove-img2" title="Remove">&times;</button>
                </div>
            </div>

            <!-- Options -->
            <div class="options-bar">
                <label class="option">
                    <span>Model</span>
                    <select id="single-model">
                        <option value="gpt-4.1" selected>GPT-4.1</option>
                        <option value="gpt-5.2">GPT-5.2</option>
                        <option value="gpt-5-mini">GPT-5 Mini</option>
                    </select>
                </label>
                <label class="option">
                    <span>Reasoning Effort</span>
                    <select id="single-reasoning">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </label>
                <label class="option toggle">
                    <span>Preprocess</span>
                    <input type="checkbox" id="single-preprocess" checked />
                    <div class="toggle-switch"></div>
                    <span class="info-btn" tabindex="0">
                        &#9432;
                        <span class="info-tooltip">Runs a 5-step pipeline: EXIF orientation fix → grayscale conversion → light Gaussian blur (σ=0.5) to smooth paper texture → auto-crop whitespace with 20px padding → resize to 1024px max edge. Preserves stroke pressure and line-weight variation.</span>
                    </span>
                </label>
            </div>

            <button class="btn-primary" id="btn-compare" disabled>
                <span class="btn-text">Compare Signatures</span>
                <span class="btn-loading">
                    <span class="spinner"></span> Analyzing…
                </span>
            </button>

            <!-- Single Result -->
            <div id="single-result" class="result-card hidden"></div>
        </section>

        <!-- Batch Verify Mode -->
        <section id="mode-batch" class="mode">
            <div class="batch-layout">
                <!-- Test signature -->
                <div class="batch-test">
                    <h3>Test Signature</h3>
                    <div class="upload-zone" id="zone-test">
                        <input type="file" id="input-test" accept="image/png,image/jpeg,image/webp,image/gif" hidden />
                        <div class="upload-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                            <span>Test Signature</span>
                            <small>Click or drag &amp; drop</small>
                        </div>
                        <img class="preview" id="preview-test" alt="Test signature" />
                        <button class="remove-btn" id="remove-test" title="Remove">&times;</button>
                    </div>
                </div>

                <!-- Reference signatures -->
                <div class="batch-refs">
                    <div class="refs-header">
                        <h3>Reference Signatures <small id="ref-count">(0/10)</small></h3>
                        <button class="btn-secondary" id="btn-add-ref">+ Add Reference</button>
                        <input type="file" id="input-refs" accept="image/png,image/jpeg,image/webp,image/gif" multiple hidden />
                    </div>
                    <div class="refs-grid" id="refs-grid">
                        <!-- Reference thumbnails injected by JS -->
                    </div>
                </div>
            </div>

            <!-- Options -->
            <div class="options-bar">
                <label class="option">
                    <span>Model</span>
                    <select id="batch-model">
                        <option value="gpt-4.1" selected>GPT-4.1</option>
                        <option value="gpt-5.2">GPT-5.2</option>
                        <option value="gpt-5-mini">GPT-5 Mini</option>
                    </select>
                </label>
                <label class="option">
                    <span>Reasoning Effort</span>
                    <select id="batch-reasoning">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </label>
                <label class="option toggle">
                    <span>Preprocess</span>
                    <input type="checkbox" id="batch-preprocess" checked />
                    <div class="toggle-switch"></div>
                    <span class="info-btn" tabindex="0">
                        &#9432;
                        <span class="info-tooltip">Runs a 5-step pipeline: EXIF orientation fix → grayscale conversion → light Gaussian blur (σ=0.5) to smooth paper texture → auto-crop whitespace with 20px padding → resize to 1024px max edge. Preserves stroke pressure and line-weight variation.</span>
                    </span>
                </label>
            </div>

            <button class="btn-primary" id="btn-batch" disabled>
                <span class="btn-text">Verify Batch</span>
                <span class="btn-loading">
                    <span class="spinner"></span> Verifying…
                </span>
            </button>

            <!-- Batch Result -->
            <div id="batch-result" class="result-card hidden"></div>
        </section>

        <!-- Audit Log Mode -->
        <section id="mode-audit" class="mode">
            <div class="audit-search">
                <label for="audit-id">Request ID</label>
                <div class="audit-input-row">
                    <input type="text" id="audit-id" placeholder="e.g. 03e3b407-942f-452c-9f14-f044a31a876b" spellcheck="false" autocomplete="off" />
                    <button class="btn-primary" id="btn-audit" disabled>
                        <span class="btn-text">Look Up</span>
                        <span class="btn-loading">
                            <span class="spinner"></span> Loading…
                        </span>
                    </button>
                </div>
            </div>
            <div id="audit-result" class="result-card hidden"></div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
