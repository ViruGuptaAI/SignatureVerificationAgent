name: CI/CD – Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  AZURE_WEBAPP_NAME: SignatureVerificationAgentDemo

jobs:
  # ───────────────────── Test ─────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/test_models.py tests/test_preprocessing.py tests/test_config.py tests/test_api.py -v

  # ───────────────────── Deploy ─────────────────────
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: SharedAIServices
          startup-command: "gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:8000 --timeout 120"

      - name: Ensure Key Vault access for managed identity
        run: |
          PRINCIPAL_ID=$(az webapp identity show \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group SharedAIServices \
            --query principalId -o tsv)

          KV_SCOPE="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/SharedAIServices/providers/Microsoft.KeyVault/vaults/sigverify-kv"

          # Check if role assignment already exists
          EXISTING=$(az role assignment list \
            --assignee "$PRINCIPAL_ID" \
            --role "Key Vault Secrets User" \
            --scope "$KV_SCOPE" \
            --query "[].principalId" -o tsv)

          if [ -z "$EXISTING" ]; then
            echo "Role assignment missing — creating..."
            az role assignment create \
              --role "Key Vault Secrets User" \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --scope "$KV_SCOPE"
          else
            echo "Key Vault role assignment already exists."
          fi
